<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquamind - Complete Your Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-blue': '#00c6ff', 'brand-purple': '#0072ff',
                        'dark-bg': '#0a192f', 'card-bg': '#172a46',
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a192f; /* dark-bg */
            color: #cbd5e1; /* slate-300 */
        }
        .gradient-text {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
         .cta-button { /* Added for the button */
            background-image: linear-gradient(to right, #00c6ff, #0072ff);
            transition: all 0.3s ease;
        }
        .cta-button:hover { /* Added for the button hover */
            opacity: 0.9;
            box-shadow: 0 4px 15px rgba(0, 198, 255, 0.2);
        }
    </style>
</head>
<body class="bg-dark-bg text-slate-300 flex items-center justify-center min-h-screen p-4"> 

    <div class="bg-card-bg p-8 md:p-12 rounded-lg shadow-xl border border-slate-700 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center gradient-text mb-8">Complete Your Profile</h2>

        <form id="profile-form" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-slate-300">Your Name</label>
                <input type="text" id="name" required class="mt-1 block w-full bg-dark-bg border border-slate-600 rounded-md p-3 text-white focus:ring-brand-blue focus:border-brand-blue">
            </div>
            <div>
                <label for="location" class="block text-sm font-medium text-slate-300">Your Location (e.g., City)</label>
                <input type="text" id="location" required class="mt-1 block w-full bg-dark-bg border border-slate-600 rounded-md p-3 text-white focus:ring-brand-blue focus:border-brand-blue">
            </div>

            <p id="error-message" class="text-red-400 text-sm h-4"></p> 

            <button type="submit" class="w-full text-white font-semibold py-3 px-6 rounded-md cta-button">
                Save Profile & Continue
            </button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script src="profile_setup.js"></script>

</body>
</html>
