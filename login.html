<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquamind - Get Started</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-blue': '#00c6ff', 'brand-purple': '#0072ff',
                        'dark-bg': '#0a192f', 'card-bg': '#172a46',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-dark-bg text-slate-300 flex items-center justify-center min-h-screen">

    <div class="bg-card-bg p-8 md:p-12 rounded-lg shadow-xl border border-slate-700 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center gradient-text mb-8">Get Started</h2>

        <form id="auth-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300">Email</label>
                <input type="email" id="email" required class="mt-1 block w-full bg-dark-bg border border-slate-600 rounded-md p-3 text-white focus:ring-brand-blue focus:border-brand-blue">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-300">Password (min. 6 characters)</label>
                <input type="password" id="password" required class="mt-1 block w-full bg-dark-bg border border-slate-600 rounded-md p-3 text-white focus:ring-brand-blue focus:border-brand-blue">
            </div>

            <p id="error-message" class="text-red-400 text-sm"></p>

            <button id="btn-signup" type="submit" class="w-full text-white font-semibold py-3 px-6 rounded-md cta-button" style="background-image: linear-gradient(to right, #00c6ff, #0072ff);">
                Sign Up
            </button>
            <button id="btn-login" type="button" class="w-full text-brand-blue font-semibold py-3 px-6 rounded-md outline-button" style="border-color: #00c6ff; color: #00c6ff;">
                Log In Instead
            </button>
        </form>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script> 

    <script src="auth.js"></script>

</body>
</html>
