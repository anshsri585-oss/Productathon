<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaMind - Usage Reports</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-blue': '#00c6ff', 'brand-purple': '#0072ff',
                        'dark-bg': '#0a192f', 'card-bg': '#172a46',
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a192f; /* dark-bg */
            color: #cbd5e1; /* slate-300 */
        }
        .header {
            background-color: #0a192f; /* dark-bg */
            border-bottom: 1px solid #1e293b; /* slate-800 */
        }
        .gradient-text {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card { /* Reusing card style for chart container */
            background-color: #172a46; /* card-bg */
            border-radius: 0.75rem;
            border: 1px solid #334155; /* slate-700 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
        }
        /* Style for date range buttons */
        .date-range-btn {
            background-color: #334155; /* slate-700 */
            color: #cbd5e1; /* slate-300 */
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .date-range-btn:hover, .date-range-btn.active {
            background-color: #475569; /* slate-600 */
        }
        .modal-backdrop { /* Added modal style */
             background-color: rgba(10, 25, 47, 0.8); /* dark-bg with opacity */
        }
    </style>
</head>
<body class="antialiased">

    <header class="header sticky top-0 z-50 bg-dark-bg/80 backdrop-blur-sm shadow-md">
        <nav class="container mx-auto max-w-7xl px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a href="index.html" class="flex items-center space-x-2">
                    <img src="aquamind_logo.jpg" alt="Aquamind Logo" class="h-10 w-auto"> 
                    <span class="text-2xl font-bold gradient-text">AquaMind</span>
                </a>
                <div class="hidden md:flex space-x-4">
                    <a href="dashboard.html" class="text-slate-300 hover:text-brand-blue px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                    <a href="#" class="bg-card-bg text-brand-blue px-3 py-2 rounded-md text-sm font-medium">Reports</a>
                    </div>
            </div>
            <div class="flex items-center space-x-4">
                <a href="#" id="profile-link" class="text-slate-300 hover:text-brand-blue">Profile</a> 
                <a href="#" id="btn-logout" class="text-slate-300 hover:text-brand-blue">Exit</a>
            </div>
        </nav>
    </header>

    <main class="container mx-auto max-w-7xl px-6 py-8">
        <h1 class="text-3xl font-bold text-white mb-6">Usage Reports</h1>

        <div class="card">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-white">Daily Usage Trend</h2>
                <div class="flex space-x-2">
                    <button id="btn-7-days" class="date-range-btn active">Last 7 Days</button>
                    <button id="btn-30-days" class="date-range-btn">Last 30 Days</button>
                </div>
            </div>
            <div class="relative h-96"> 
                <canvas id="usage-trend-chart"></canvas>
            </div>
        </div>

        </main>

    <div id="profile-modal" class="hidden fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4">
       {/* ... Paste the entire profile modal code from dashboard.html here ... */}
       <div class="bg-card-bg p-8 rounded-lg shadow-xl border border-slate-700 w-full max-w-md relative">
            <button id="close-modal-btn" class="absolute top-4 right-4 text-slate-400 hover:text-white text-2xl">&times;</button>
            <h2 class="text-2xl font-bold text-white mb-6 text-center gradient-text">Your Profile</h2>
            <div class="space-y-4">
                <div><p class="text-sm font-medium text-slate-400">Email:</p><p id="profile-email" class="text-lg text-white">Loading...</p></div>
                <div><p class="text-sm font-medium text-slate-400">Name:</p><p id="profile-name" class="text-lg text-white">Loading...</p></div>
                <div><p class="text-sm font-medium text-slate-400">Location:</p><p id="profile-location" class="text-lg text-white">Loading...</p></div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.28.0/dist/date-fns.min.js"></script> 
    
    <script src="reports.js"></script> 

</body>
</html>
